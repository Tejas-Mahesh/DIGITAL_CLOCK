<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    
    <!-- Days -->
    <div class="days">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
    </div>

    <!-- Time -->
    <div class="clock">
        <span id="hours">00</span>:
        <span id="minutes">00</span>
        <span id="seconds">00</span>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
